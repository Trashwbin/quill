baseURL = 'https://blog.trashwbin.top/'
title = 'Quill'
theme = 'PaperMod'
paginate = 10

defaultContentLanguage = 'zh'
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true

[params]
  env = "production"
  author = "Abin"
  defaultTheme = "auto"  # auto / dark / light
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/trashwbin"

[params.assets]
  disableHLJS = true

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ── Languages ────────────────────────────────────────────

[languages]

  [languages.zh]
    languageName = '中文'
    languageCode = 'zh-CN'
    weight = 1
    title = 'Quill'
    contentDir = 'content/zh'

    [languages.zh.params]
      description = "Abin 的个人博客"

      [languages.zh.params.homeInfoParams]
        Title = "Hey 👋"
        Content = "我是 Abin，这里记录我对技术和产品的思考。"

    [[languages.zh.menu.main]]
      identifier = "posts"
      name = "文章"
      url = "/posts/"
      weight = 10

    [[languages.zh.menu.main]]
      identifier = "archives"
      name = "归档"
      url = "/archives/"
      weight = 20

    [[languages.zh.menu.main]]
      identifier = "tags"
      name = "标签"
      url = "/tags/"
      weight = 30

    [[languages.zh.menu.main]]
      identifier = "search"
      name = "搜索"
      url = "/search/"
      weight = 40

  [languages.en]
    languageName = 'EN'
    languageCode = 'en-US'
    weight = 2
    title = 'Quill'
    contentDir = 'content/en'

    [languages.en.params]
      description = "Abin's personal blog"

      [languages.en.params.homeInfoParams]
        Title = "Hey 👋"
        Content = "I'm Abin. I write about tech and product thinking."

    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10

    [[languages.en.menu.main]]
      identifier = "archives"
      name = "Archives"
      url = "/archives/"
      weight = 20

    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 30

    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
