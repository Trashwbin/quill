<style>
/* Mermaid: natural size, scroll if wider than screen */
.mermaid {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  text-align: center;
  margin: 1.5em 0;
  padding: 0.5em 0;
}

/* === Responsive content width === */

/* Default (mobile): full width, PaperMod default */

/* Tablet and up: slightly wider */
@media (min-width: 768px) {
  :root {
    --main-width: 780px;
  }
}

/* Desktop with sidebar */
@media (min-width: 1280px) {
  :root {
    --main-width: 900px;
  }

  .post-with-sidebar {
    display: flex;
    gap: 2rem;
    max-width: calc(var(--main-width) + 240px + var(--gap) * 2);
    margin: 0 auto;
  }

  .sidebar-toc {
    width: 240px;
    flex-shrink: 0;
    position: relative;
  }

  .sidebar-toc-inner {
    position: sticky;
    top: 5rem;
    max-height: calc(100vh - 6rem);
    overflow-y: auto;
    padding-right: 1rem;
    font-size: 0.82rem;
    line-height: 1.6;
  }

  .sidebar-toc-inner::-webkit-scrollbar { width: 2px; }
  .sidebar-toc-inner::-webkit-scrollbar-thumb { background: var(--tertiary); border-radius: 2px; }

  .post-single.has-sidebar {
    flex: 1;
    min-width: 0;
  }
}

/* Large desktop: wider content */
@media (min-width: 1600px) {
  :root {
    --main-width: 1000px;
  }

  .post-with-sidebar {
    max-width: calc(var(--main-width) + 260px + var(--gap) * 2);
  }

  .sidebar-toc {
    width: 260px;
  }
}

/* === TOC styles === */
.sidebar-toc-title {
  display: block;
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 0.75rem;
  color: var(--primary);
  letter-spacing: 0.02em;
}

.sidebar-toc-inner #TableOfContents ul {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

.sidebar-toc-inner #TableOfContents ul ul {
  padding-left: 0.85rem;
}

.sidebar-toc-inner #TableOfContents a {
  display: block;
  padding: 0.2rem 0;
  color: var(--secondary);
  text-decoration: none;
  border-left: 2px solid transparent;
  padding-left: 0.6rem;
  transition: all 0.15s ease;
}

.sidebar-toc-inner #TableOfContents a:hover {
  color: var(--primary);
  border-left-color: var(--tertiary);
}

.sidebar-toc-inner #TableOfContents a.active {
  color: var(--primary);
  border-left-color: var(--primary);
  font-weight: 500;
}

/* === Series nav styles === */
.sidebar-series-title {
  display: block;
  font-weight: 600;
  font-size: 0.85rem;
  margin-top: 1.5rem;
  margin-bottom: 0.75rem;
  padding-top: 1rem;
  border-top: 1px solid var(--tertiary);
  color: var(--primary);
  letter-spacing: 0.02em;
}

.sidebar-series-list {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

.sidebar-series-list li {
  margin-bottom: 0.3rem;
}

.sidebar-series-list a {
  display: block;
  padding: 0.25rem 0.6rem;
  color: var(--secondary);
  text-decoration: none;
  font-size: 0.82rem;
  line-height: 1.5;
  border-left: 2px solid transparent;
  transition: all 0.15s ease;
}

.sidebar-series-list a:hover {
  color: var(--primary);
  border-left-color: var(--tertiary);
}

.sidebar-series-list li.current a {
  color: var(--primary);
  font-weight: 500;
  border-left-color: var(--primary);
}

/* === Hide sidebar on mobile === */
@media (max-width: 1279px) {
  .sidebar-toc { display: none; }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  var toc = document.querySelector(".sidebar-toc-inner");
  if (!toc) return;

  var links = toc.querySelectorAll("#TableOfContents a");
  if (links.length === 0) return;

  var headings = [];
  links.forEach(function(link) {
    var id = link.getAttribute("href").slice(1);
    var el = document.getElementById(id);
    if (el) headings.push({ el: el, link: link });
  });

  function update() {
    var scrollY = window.scrollY + 100;
    var current = null;
    for (var i = 0; i < headings.length; i++) {
      if (headings[i].el.offsetTop <= scrollY) current = i;
    }
    links.forEach(function(l) { l.classList.remove("active"); });
    if (current !== null) headings[current].link.classList.add("active");
  }

  window.addEventListener("scroll", update, { passive: true });
  update();
});
</script>
