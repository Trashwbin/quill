{{- define "main" }}
<div style="text-align:center; padding: 4rem 1rem;">
  <h1 style="font-size: 6rem; font-weight: 700; margin: 0; opacity: 0.15;">404</h1>
  <p style="font-size: 1.25rem; margin: 1rem 0 0.5rem;">Page not found</p>
  <p style="color: var(--secondary); margin-bottom: 2rem;">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ "" | absLangURL }}" style="display: inline-block; padding: 0.6rem 1.5rem; border: 1px solid var(--primary); border-radius: 6px; color: var(--primary); text-decoration: none; transition: all 0.2s;">
    Back to Home
  </a>
</div>
{{- end }}
